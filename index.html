<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0b0b0d">
  <title>4W Protokoll</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js" defer></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:#0b0b0d; --bg-card:#131316; --bg-input:#1a1a1f; --bg-hover:#202026;
      --border:#272730; --border-lit:#34343f;
      --text:#e0e0e8; --text-sub:#606070; --text-mid:#9090a0;
      --accent:#e8a020; --accent-soft:rgba(232,160,32,0.12);
      --green:#22c55e; --green-soft:rgba(34,197,94,0.11);
      --red:#ef4444; --red-soft:rgba(239,68,68,0.11);
      --orange:#f97316; --orange-soft:rgba(249,115,22,0.11);
      --radius:12px; --radius-sm:8px;
      --font:-apple-system,BlinkMacSystemFont,'Helvetica Neue','Segoe UI',sans-serif;
      --mono:ui-monospace,'SF Mono','Cascadia Mono','Consolas',monospace;
    }
    html { height:100%; background:var(--bg); }
    body { height:100%; background:var(--bg); color:var(--text); font-family:var(--font); font-size:15px; line-height:1.5; -webkit-font-smoothing:antialiased; overflow:hidden; }
    .app { display:flex; flex-direction:column; height:100dvh; height:-webkit-fill-available; max-width:430px; margin:0 auto; }
    .stripe { height:2px; background:linear-gradient(90deg,var(--accent) 0%,rgba(232,160,32,0.3) 60%,transparent 100%); flex-shrink:0; }

    /* HEADER */
    .header { padding:10px 20px 0; flex-shrink:0; }
    .header-top { display:flex; align-items:center; gap:8px; margin-bottom:2px; }
    .header-date-text { font-family:var(--mono); font-size:10px; color:var(--text-sub); letter-spacing:0.1em; text-transform:uppercase; flex:1; }
    .date-edit-btn { background:none; border:none; color:var(--text-sub); font-size:14px; cursor:pointer; padding:2px 4px; border-radius:4px; -webkit-tap-highlight-color:transparent; }
    .date-edit-btn:active { color:var(--accent); }
    .date-picker-input { display:none; width:100%; background:var(--bg-input); border:1px solid var(--accent); border-radius:var(--radius-sm); color:var(--text); font-size:15px; padding:8px 12px; outline:none; font-family:var(--mono); margin-bottom:6px; -webkit-appearance:none; }
    .date-picker-input.show { display:block; }
    .header-row { display:flex; align-items:baseline; justify-content:space-between; margin-bottom:2px; }
    .header-title { font-size:19px; font-weight:800; letter-spacing:-0.03em; }
    .header-day { font-family:var(--mono); font-size:12px; color:var(--accent); font-weight:700; }

    /* STATS BAR */
    .stats-bar { display:flex; gap:6px; padding:8px 20px; flex-shrink:0; }
    .stat-pill { flex:1; background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius-sm); padding:7px 8px; display:flex; flex-direction:column; align-items:center; gap:1px; }
    .stat-pill.accent { border-color:var(--accent); background:var(--accent-soft); }
    .stat-num { font-family:var(--mono); font-size:18px; font-weight:800; color:var(--accent); line-height:1; }
    .stat-pill:not(.accent) .stat-num { color:var(--text); }
    .stat-label { font-size:9px; font-weight:700; color:var(--text-sub); letter-spacing:0.05em; text-transform:uppercase; text-align:center; }
    .stat-pill.accent .stat-label { color:var(--accent); }

    /* EDIT BANNER */
    .edit-banner { display:none; margin:0 20px; background:var(--accent-soft); border:1px solid var(--accent); border-radius:var(--radius-sm); padding:9px 14px; align-items:center; justify-content:space-between; gap:10px; flex-shrink:0; }
    .edit-banner.show { display:flex; }
    .edit-banner-text { font-size:12px; color:var(--accent); font-weight:600; flex:1; min-width:0; }
    .edit-cancel-btn { background:none; border:1px solid var(--accent); border-radius:6px; color:var(--accent); font-size:12px; font-weight:700; font-family:var(--font); padding:4px 10px; cursor:pointer; -webkit-tap-highlight-color:transparent; white-space:nowrap; flex-shrink:0; }

    /* TAB NAV */
    .tab-nav { display:flex; padding:8px 20px 0; gap:5px; flex-shrink:0; }
    .tab-btn { flex:1; padding:10px 4px; background:transparent; border:1px solid var(--border); border-radius:var(--radius-sm); color:var(--text-sub); font-size:13px; font-weight:600; font-family:var(--font); cursor:pointer; transition:all 0.15s; -webkit-tap-highlight-color:transparent; }
    .tab-btn.active { background:var(--accent); border-color:var(--accent); color:#000; font-weight:800; }

    /* TAB CONTENT */
    .tab-content { display:none; flex:1; overflow-y:auto; overflow-x:hidden; padding:12px 20px calc(24px + env(safe-area-inset-bottom,0px)); -webkit-overflow-scrolling:touch; overscroll-behavior:contain; }
    .tab-content.active { display:block; }
    .tab-content::-webkit-scrollbar { display:none; }

    /* SECTION */
    .section { margin-bottom:16px; }
    .section-label { display:flex; align-items:center; gap:8px; font-size:10px; font-weight:800; letter-spacing:0.13em; text-transform:uppercase; color:var(--accent); margin-bottom:7px; }
    .section-label::after { content:''; flex:1; height:1px; background:var(--border); }
    .card { background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius); padding:14px; }

    /* FIELDS */
    .field { margin-bottom:12px; }
    .field:last-child { margin-bottom:0; }
    .field-label { display:block; font-size:11px; font-weight:700; color:var(--text-sub); letter-spacing:0.05em; text-transform:uppercase; margin-bottom:5px; }
    .field-row { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
    .field-row .field { margin-bottom:0; }

    /* INPUTS */
    input[type="time"],input[type="number"],input[type="text"],textarea {
      width:100%; background:var(--bg-input); border:1px solid var(--border); border-radius:var(--radius-sm);
      color:var(--text); font-size:16px; padding:11px 12px; outline:none;
      transition:border-color 0.15s,background 0.15s; -webkit-appearance:none; font-family:var(--mono);
    }
    input:focus,textarea:focus { border-color:var(--accent); background:var(--bg-hover); }
    input::placeholder,textarea::placeholder { color:var(--text-sub); }
    input[type="number"] { text-align:center; }
    input[type="number"]::-webkit-inner-spin-button,input[type="number"]::-webkit-outer-spin-button { -webkit-appearance:none; }
    input[type="number"] { -moz-appearance:textfield; }
    textarea { resize:none; font-family:var(--font); font-size:15px; min-height:70px; line-height:1.45; }
    input[type="time"]::-webkit-calendar-picker-indicator { filter:invert(0.5); opacity:0.7; }
    .half-width { max-width:48%; }

    /* COFFEE WARNING */
    .kaffee-warn { display:none; font-size:11px; font-weight:700; color:var(--red); margin-top:5px; padding:6px 10px; background:var(--red-soft); border-radius:6px; }
    .kaffee-warn.show { display:block; }

    /* TOGGLES */
    .toggle-group { display:flex; gap:4px; }
    .toggle-btn { flex:1; padding:11px 4px; background:var(--bg-input); border:1px solid var(--border); border-radius:var(--radius-sm); color:var(--text-sub); font-size:12px; font-weight:700; font-family:var(--font); text-align:center; cursor:pointer; transition:all 0.14s; -webkit-tap-highlight-color:transparent; user-select:none; }
    .toggle-btn.t-green  { background:var(--green-soft);  border-color:var(--green);  color:var(--green); }
    .toggle-btn.t-orange { background:var(--orange-soft); border-color:var(--orange); color:var(--orange); }
    .toggle-btn.t-red    { background:var(--red-soft);    border-color:var(--red);    color:var(--red); }
    .toggle-btn.t-accent { background:var(--accent-soft); border-color:var(--accent); color:var(--accent); }

    /* PRAYERS */
    .prayer-row { display:flex; align-items:center; gap:8px; padding:9px 0; border-bottom:1px solid var(--border); }
    .prayer-row:last-of-type { border-bottom:none; padding-bottom:0; }
    .prayer-row:first-of-type { padding-top:0; }
    .prayer-name { font-size:13px; font-weight:700; width:56px; flex-shrink:0; }
    .prayer-row .toggle-group { flex:1; }

    /* STEPPER */
    .stepper { display:flex; align-items:center; background:var(--bg-input); border:1px solid var(--border); border-radius:var(--radius-sm); overflow:hidden; }
    .stepper-btn { width:54px; height:46px; background:transparent; border:none; color:var(--text-mid); font-size:24px; font-family:var(--font); cursor:pointer; display:flex; align-items:center; justify-content:center; -webkit-tap-highlight-color:transparent; transition:background 0.1s; flex-shrink:0; }
    .stepper-btn:active { background:var(--border-lit); }
    .stepper-val { flex:1; text-align:center; font-family:var(--mono); font-size:22px; font-weight:800; }

    /* GLASS WATER */
    .glass-tracker { background:var(--bg-input); border:1px solid var(--border); border-radius:var(--radius-sm); padding:12px 14px; }
    .glass-row { display:flex; align-items:center; }
    .glass-count-btn { width:52px; height:48px; background:transparent; border:none; color:var(--text-mid); font-size:26px; font-family:var(--font); cursor:pointer; display:flex; align-items:center; justify-content:center; -webkit-tap-highlight-color:transparent; flex-shrink:0; transition:color 0.15s; }
    .glass-count-btn:active { color:var(--accent); }
    .glass-center { flex:1; text-align:center; }
    .glass-big { font-family:var(--mono); font-size:28px; font-weight:800; line-height:1; display:block; }
    .glass-unit { font-size:11px; color:var(--text-sub); font-weight:700; letter-spacing:0.05em; text-transform:uppercase; }
    .glass-dl-text { font-size:11px; color:var(--text-sub); margin-top:2px; }
    .glass-dots { display:flex; flex-wrap:wrap; gap:5px; margin-top:10px; padding-top:10px; border-top:1px solid var(--border); }
    .glass-dot { width:22px; height:22px; border-radius:4px; background:var(--border); transition:background 0.15s; }
    .glass-dot.filled { background:var(--accent); }

    /* SLIDERS */
    .slider-row { display:flex; align-items:center; gap:12px; }
    .slider-num { font-family:var(--mono); font-size:22px; font-weight:800; color:var(--accent); width:24px; text-align:right; flex-shrink:0; }
    input[type="range"] { flex:1; height:6px; -webkit-appearance:none; appearance:none; background:linear-gradient(to right,var(--accent) 0%,var(--accent) var(--fill,44.4%),var(--border-lit) var(--fill,44.4%),var(--border-lit) 100%); border-radius:3px; outline:none; cursor:pointer; }
    input[type="range"]::-webkit-slider-thumb { -webkit-appearance:none; width:26px; height:26px; background:var(--accent); border-radius:50%; border:3px solid var(--bg-card); box-shadow:0 0 0 1.5px var(--accent); }
    input[type="range"]::-moz-range-thumb { width:26px; height:26px; background:var(--accent); border-radius:50%; border:3px solid var(--bg-card); }
    .slider-scale { display:flex; justify-content:space-between; margin-top:3px; }
    .slider-scale span { font-size:10px; color:var(--text-sub); }

    /* TRAINING */
    .training-detail { margin-top:10px; display:none; }
    .training-detail.show { display:block; }
    .divider { height:1px; background:var(--border); margin:12px 0; }

    /* SAVE BTN */
    .save-btn { width:100%; padding:16px; background:var(--accent); border:none; border-radius:var(--radius); color:#000; font-size:16px; font-weight:800; font-family:var(--font); cursor:pointer; transition:all 0.15s; -webkit-tap-highlight-color:transparent; margin-top:4px; letter-spacing:-0.01em; }
    .save-btn:active { transform:scale(0.98); opacity:0.88; }
    .save-btn.saved { background:var(--green); }

    /* ZIELE */
    .week-selector { display:flex; gap:6px; margin-bottom:14px; }
    .week-btn { flex:1; padding:11px 4px; background:transparent; border:1px solid var(--border); border-radius:var(--radius-sm); color:var(--text-sub); font-size:13px; font-weight:700; font-family:var(--font); cursor:pointer; -webkit-tap-highlight-color:transparent; transition:all 0.15s; }
    .week-btn.active { background:var(--accent-soft); border-color:var(--accent); color:var(--accent); }
    .goals-save-btn { width:100%; padding:14px; background:transparent; border:1px solid var(--border-lit); border-radius:var(--radius); color:var(--text-mid); font-size:14px; font-weight:700; font-family:var(--font); cursor:pointer; transition:all 0.15s; -webkit-tap-highlight-color:transparent; margin-top:4px; }
    .goals-save-btn:active { border-color:var(--accent); color:var(--accent); }
    .goals-save-btn.saved { color:var(--green); border-color:var(--green); }

    /* CHARTS */
    .chart-card { background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius); padding:12px 14px; margin-bottom:10px; }
    .chart-label { font-size:10px; font-weight:800; letter-spacing:0.1em; text-transform:uppercase; color:var(--accent); margin-bottom:10px; }
    .chart-wrap { height:120px; position:relative; }
    .chart-empty { height:80px; display:flex; align-items:center; justify-content:center; font-size:12px; color:var(--text-sub); }

    /* HISTORY */
    .history-meta { font-size:11px; color:var(--text-sub); margin-bottom:12px; font-family:var(--mono); }
    .day-card { background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius); margin-bottom:10px; overflow:hidden; }
    .day-card-head { padding:12px 15px; display:flex; align-items:center; gap:10px; cursor:pointer; -webkit-tap-highlight-color:transparent; user-select:none; }
    .day-card-head:active { background:var(--bg-hover); }
    .day-card-info { flex:1; min-width:0; }
    .day-card-date { font-family:var(--mono); font-size:12px; font-weight:700; }
    .day-card-meta { font-size:11px; color:var(--text-sub); margin-top:2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .day-card-right { display:flex; align-items:center; gap:8px; flex-shrink:0; }

    /* SCORE BADGE */
    .score-badge { display:inline-flex; align-items:center; justify-content:center; padding:3px 9px; border-radius:20px; font-family:var(--mono); font-size:12px; font-weight:800; white-space:nowrap; }
    .score-7  { background:var(--accent-soft); color:var(--accent); border:1px solid var(--accent); }
    .score-hi { background:var(--green-soft);  color:var(--green);  border:1px solid var(--green); }
    .score-mid{ background:var(--orange-soft); color:var(--orange); border:1px solid var(--orange); }
    .score-lo { background:var(--red-soft);    color:var(--red);    border:1px solid var(--red); }

    .day-chevron { color:var(--text-sub); font-size:13px; transition:transform 0.2s; }
    .day-card.open .day-chevron { transform:rotate(180deg); }
    .day-card-body { display:none; padding:0 15px 14px; border-top:1px solid var(--border); }
    .day-card.open .day-card-body { display:block; }

    /* CARD ACTIONS */
    .card-actions { display:flex; gap:8px; margin-top:14px; padding-top:12px; border-top:1px solid var(--border); }
    .card-action-btn { flex:1; padding:10px; background:var(--bg-input); border-radius:var(--radius-sm); font-size:12px; font-weight:700; font-family:var(--font); cursor:pointer; -webkit-tap-highlight-color:transparent; transition:all 0.15s; }
    .card-action-btn.edit   { border:1px solid var(--border-lit); color:var(--text-mid); }
    .card-action-btn.edit:active   { border-color:var(--accent); color:var(--accent); }
    .card-action-btn.delete { border:1px solid var(--border-lit); color:var(--text-sub); }
    .card-action-btn.delete:active { border-color:var(--red); color:var(--red); }

    /* COMPLIANCE RULES */
    .compliance-grid { display:grid; grid-template-columns:1fr 1fr; gap:4px; margin-top:6px; }
    .rule-item { display:flex; align-items:center; gap:5px; font-size:11px; padding:4px 7px; border-radius:5px; }
    .rule-item.pass { background:var(--green-soft); color:var(--green); }
    .rule-item.fail { background:var(--red-soft);   color:var(--red); }
    .rule-item.na   { background:var(--bg-input);   color:var(--text-sub); }
    .rule-icon { font-size:10px; flex-shrink:0; }

    /* DETAIL ITEMS */
    .ds { margin-top:12px; }
    .ds-title { font-size:9px; font-weight:800; letter-spacing:0.12em; text-transform:uppercase; color:var(--accent); margin-bottom:6px; }
    .dg { display:grid; grid-template-columns:1fr 1fr; gap:5px; }
    .di { background:var(--bg-input); border-radius:6px; padding:7px 10px; }
    .di.full { grid-column:1/-1; }
    .di-k { font-size:10px; color:var(--text-sub); margin-bottom:1px; }
    .di-v { font-family:var(--mono); font-size:13px; font-weight:700; word-break:break-word; }
    .di-v.normal { font-family:var(--font); font-size:12px; font-weight:400; line-height:1.4; }

    .p-badges { display:flex; flex-wrap:wrap; gap:4px; }
    .p-badge { display:inline-flex; align-items:center; gap:3px; padding:3px 8px; border-radius:5px; font-size:11px; font-weight:700; }
    .p-badge.g { background:var(--green-soft);  color:var(--green); }
    .p-badge.o { background:var(--orange-soft); color:var(--orange); }
    .p-badge.r { background:var(--red-soft);    color:var(--red); }

    /* EXPORT */
    .export-btn { width:100%; padding:14px; background:transparent; border:1px dashed var(--border-lit); border-radius:var(--radius); color:var(--text-sub); font-size:13px; font-weight:700; font-family:var(--font); cursor:pointer; -webkit-tap-highlight-color:transparent; transition:all 0.15s; margin-top:4px; }
    .export-btn:active { border-color:var(--accent); color:var(--accent); }

    /* EMPTY / TOAST */
    .empty { text-align:center; padding:52px 20px; color:var(--text-sub); }
    .empty-icon { font-size:36px; margin-bottom:12px; opacity:0.35; }
    .empty-text { font-size:14px; }
    .toast { position:fixed; bottom:28px; left:50%; transform:translateX(-50%) translateY(10px); background:var(--text); color:var(--bg); padding:9px 20px; border-radius:20px; font-size:13px; font-weight:800; opacity:0; transition:all 0.22s cubic-bezier(.34,1.4,.64,1); pointer-events:none; white-space:nowrap; z-index:999; }
    .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
  </style>
</head>
<body>
<div class="app">
  <div class="stripe"></div>

  <!-- HEADER -->
  <div class="header">
    <div class="header-top">
      <span class="header-date-text" id="headerDateText">—</span>
      <button class="date-edit-btn" onclick="toggleDatePicker()" title="Datum ändern">✎</button>
    </div>
    <input type="date" id="datePicker" class="date-picker-input" onchange="onDateChange(this.value)">
    <div class="header-row">
      <div class="header-title">4W Protokoll</div>
      <div class="header-day" id="headerDayNum"></div>
    </div>
  </div>

  <!-- STATS BAR -->
  <div class="stats-bar">
    <div class="stat-pill">
      <span class="stat-num" id="statFajr">0</span>
      <span class="stat-label">🌙 Fajr</span>
    </div>
    <div class="stat-pill">
      <span class="stat-num" id="statDairy">0</span>
      <span class="stat-label">🥛 Dairy-Free</span>
    </div>
    <div class="stat-pill accent">
      <span class="stat-num" id="statScore">—</span>
      <span class="stat-label">Score /7</span>
    </div>
  </div>

  <!-- EDIT BANNER -->
  <div class="edit-banner" id="editBanner">
    <span class="edit-banner-text" id="editBannerText">—</span>
    <button class="edit-cancel-btn" onclick="cancelEdit()">✕ Heute</button>
  </div>

  <!-- TAB NAV -->
  <nav class="tab-nav">
    <button class="tab-btn active" onclick="switchTab('heute',this)">Heute</button>
    <button class="tab-btn"        onclick="switchTab('ziele',this)">Ziele</button>
    <button class="tab-btn"        onclick="switchTab('verlauf',this)">Verlauf</button>
  </nav>

  <!-- ══ TAB HEUTE ══ -->
  <div id="tab-heute" class="tab-content active">

    <div class="section">
      <div class="section-label">Schlaf</div>
      <div class="card">
        <div class="field-row">
          <div class="field"><label class="field-label">Schlafzeit</label><input type="time" id="schlafzeit"></div>
          <div class="field"><label class="field-label">Aufwachzeit</label><input type="time" id="aufwachzeit"></div>
        </div>
        <div class="field-row">
          <div class="field"><label class="field-label">HRV</label><input type="number" id="hrv" placeholder="—" min="0" max="200"></div>
          <div class="field"><label class="field-label">REM (min)</label><input type="number" id="rem" placeholder="—" min="0" max="300"></div>
        </div>
        <div class="field-row">
          <div class="field"><label class="field-label">Body Battery %</label><input type="number" id="bodyBattery" placeholder="—" min="0" max="100"></div>
          <div class="field"><label class="field-label">Schlaf-Score</label><input type="number" id="schlafScore" placeholder="—" min="0" max="100"></div>
        </div>
        <div class="field half-width"><label class="field-label">Ruhepuls (bpm)</label><input type="number" id="ruhepuls" placeholder="—" min="30" max="120"></div>
      </div>
    </div>

    <div class="section">
      <div class="section-label">Gebete</div>
      <div class="card">
        <div class="prayer-row"><span class="prayer-name">Fajr</span>
          <div class="toggle-group" data-name="fajr">
            <button class="toggle-btn" data-val="puenktlich" data-color="t-green">Pünktl.</button>
            <button class="toggle-btn" data-val="verspaetet" data-color="t-orange">Verspät.</button>
            <button class="toggle-btn" data-val="verpasst" data-color="t-red">Verpasst</button>
          </div>
        </div>

          <div class="stepper">

          <div class="toggle-group" data-name="training">
            <button class="toggle-btn" data-val="ja" data-color="t-green">Ja</button>
            <button class="toggle-btn" data-val="nein" data-color="t-red">Nein</button>
          </div>

          <textarea id="wasLiefGut" placeholder="Positiver Anker..." rows="2"></textarea>

  <!-- ══ TAB ZIELE ══ -->
  <div id="tab-ziele" class="tab-content">
    <div class="week-selector">
      <button class="week-btn active" onclick="switchWeek(1,this)">Woche 1</button>
      <button class="week-btn" onclick="switchWeek(2,this)">Woche 2</button>
      <button class="week-btn" onclick="switchWeek(3,this)">Woche 3</button>
      <button class="week-btn" onclick="switchWeek(4,this)">Woche 4</button>
    </div>
    <div id="goalsContent"></div>
  </div>

  <!-- ══ TAB VERLAUF ══ -->
  <div id="tab-verlauf" class="tab-content">
    <div id="chartsSection"></div>
    <div id="historyList"></div>
    <button class="export-btn" onclick="exportData()">↓ JSON Export — alle Daten</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const DAY_PFX='p4w_day_', GOALS_PFX='p4w_goals_w';
const ALL_COLORS=['t-green','t-orange','t-red','t-accent'];
const PRAYER_IDS=['fajr','dhuhr','asr','maghrib','isha'];
const PRAYER_DISP={fajr:'Fajr',dhuhr:'Dhuhr',asr:'Asr',maghrib:'Maghrib',isha:'Isha'};
const PRAYER_COLOR={puenktlich:'g',verspaetet:'o',verpasst:'r'};
const PRAYER_SYM={puenktlich:'✓',verspaetet:'~',verpasst:'✗'};
const GLASS_DL=2.5;

let activeDate=todayKey(), mahlzeitenCount=3, glaserCount=0, currentWeek=1;
let chartInstances={}, toastTimer=null;

function todayKey(){ return new Date().toISOString().split('T')[0]; }
function fmtLong(s){ const d=new Date(s+'T12:00:00'); return d.toLocaleDateString('de-DE',{weekday:'long',day:'numeric',month:'long',year:'numeric'}); }
function fmtShort(s){ const d=new Date(s+'T12:00:00'); return d.toLocaleDateString('de-DE',{day:'2-digit',month:'2-digit'}); }
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function getVal(id){ const e=document.getElementById(id); return e?e.value:''; }
function setVal(id,v){ const e=document.getElementById(id); if(e&&v!==undefined&&v!==null&&v!=='')e.value=v; }
function timeToMin(t){ if(!t)return null; const[h,m]=t.split(':').map(Number); return(h<6?h+24:h)*60+m; }

function toast(msg){ const e=document.getElementById('toast'); e.textContent=msg; e.classList.add('show'); clearTimeout(toastTimer); toastTimer=setTimeout(()=>e.classList.remove('show'),2200); }

function switchTab(id,btn){
  document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('tab-'+id).classList.add('active');
  btn.classList.add('active');
  if(id==='verlauf') renderVerlauf();
  if(id==='ziele')   renderGoals();
}

function toggleDatePicker(){
  const e=document.getElementById('datePicker');
  e.classList.toggle('show');
  if(e.classList.contains('show')) e.value=activeDate;
}
function onDateChange(ds){
  if(!ds) return;
  activeDate=ds;
  document.getElementById('datePicker').classList.remove('show');
  updateHeader(); clearForm(); loadForDate(activeDate); updateStatsBar();
}
function cancelEdit(){
  activeDate=todayKey();
  document.getElementById('datePicker').classList.remove('show');
  updateHeader(); clearForm(); loadForDate(activeDate); updateStatsBar();
}

function updateHeader(){
  const isToday=activeDate===todayKey();
  document.getElementById('headerDateText').textContent=fmtLong(activeDate);
  document.getElementById('editBanner').classList.toggle('show',!isToday);
  document.getElementById('editBannerText').textContent='Bearbeitung: '+fmtLong(activeDate);
  const n=dayNumber();
  document.getElementById('headerDayNum').textContent=n?'Tag '+n+' / 28':'';
}

function dayNumber(){
  const keys=allDayKeys(); if(!keys.length) return null;
  const first=new Date(keys[keys.length-1]+'T12:00:00');
  const now=new Date(todayKey()+'T12:00:00');
  return Math.min(Math.round((now-first)/86400000)+1,28);
}

function calcStreak(fn){ const keys=allDayKeys(); let s=0; for(const k of keys){ const d=JSON.parse(localStorage.getItem(DAY_PFX+k)||'{}'); if(fn(d))s++; else break; } return s; }

function updateStatsBar(){
  document.getElementById('statFajr').textContent=calcStreak(d=>d.gebete?.fajr==='puenktlich');
  document.getElementById('statDairy').textContent=calcStreak(d=>d.ernaehrung?.dairy==='nein');
  const raw=localStorage.getItem(DAY_PFX+activeDate);
  document.getElementById('statScore').textContent=raw?calcCompliance(JSON.parse(raw)).passed+'/7':'—';
}

function calcCompliance(d){
  const s=d.schlaf||{}, g=d.gebete||{}, er=d.ernaehrung||{}, v=d.verhalten||{};
  const rules=[
    {label:'Schlaf ≤ 22:30',   pass:!!(s.schlafzeit&&timeToMin(s.schlafzeit)<=timeToMin('22:30')), na:!s.schlafzeit},
    {label:'Fajr pünktlich',   pass:g.fajr==='puenktlich', na:!g.fajr},
    {label:'Kein Fajr-Schlaf', pass:g.nachFajrGeschlafen==='nein', na:!g.nachFajrGeschlafen},
    {label:'Dairy-free',       pass:er.dairy==='nein', na:!er.dairy},
    {label:'Kaffee ≤ 12:00',   pass:!!(er.letzterKaffee&&er.letzterKaffee<='12:00'), na:!er.letzterKaffee},
    {label:'Bildschirm ≤ 22',  pass:!!(v.bildschirmWeg&&v.bildschirmWeg<='22:00'), na:!v.bildschirmWeg},
    {label:'≥ 2 Mahlzeiten',   pass:Number(er.anzahlMahlzeiten)>=2, na:!er.anzahlMahlzeiten},
  ];
  return {passed:rules.filter(r=>r.pass).length, total:7, rules};
}

function scoreClass(n){ if(n===7)return'score-7'; if(n>=5)return'score-hi'; if(n>=3)return'score-mid'; return'score-lo'; }

/* TOGGLES */
function initToggles(){
  document.querySelectorAll('.toggle-group').forEach(grp=>{
    grp.querySelectorAll('.toggle-btn').forEach(btn=>{
      btn.addEventListener('click',()=>{
        grp.querySelectorAll('.toggle-btn').forEach(b=>ALL_COLORS.forEach(c=>b.classList.remove(c)));
        btn.classList.add(btn.dataset.color);
        if(grp.dataset.name==='training')
          document.getElementById('trainingDetail').classList.toggle('show',btn.dataset.val==='ja');
      });
    });
  });
}
function getToggle(name){ const grp=document.querySelector(`.toggle-group[data-name="${name}"]`); if(!grp)return''; for(const btn of grp.querySelectorAll('.toggle-btn')){ if(ALL_COLORS.some(c=>btn.classList.contains(c)))return btn.dataset.val; } return''; }
function setToggle(name,v){ if(!v)return; const grp=document.querySelector(`.toggle-group[data-name="${name}"]`); if(!grp)return; grp.querySelectorAll('.toggle-btn').forEach(btn=>{ ALL_COLORS.forEach(c=>btn.classList.remove(c)); if(btn.dataset.val===v)btn.classList.add(btn.dataset.color); }); if(name==='training'){const td=document.getElementById('trainingDetail');if(td)td.classList.toggle('show',v==='ja');} }

/* SLIDERS */
function syncSlider(input,numId){ const v=parseInt(input.value),mn=parseInt(input.min),mx=parseInt(input.max); input.style.setProperty('--fill',((v-mn)/(mx-mn)*100)+'%'); document.getElementById(numId).textContent=v; }
function initSliders(){ [['energie','energieVal'],['brainFog','brainFogVal']].forEach(([id,nid])=>{ const el=document.getElementById(id); if(el)syncSlider(el,nid); }); }

/* STEPPER */
function stepChange(d){ mahlzeitenCount=Math.max(1,Math.min(5,mahlzeitenCount+d)); document.getElementById('mahlzeitenVal').textContent=mahlzeitenCount; }

/* GLASS WATER */
function glassChange(d){ glaserCount=Math.max(0,glaserCount+d); updateGlassUI(); }
function updateGlassUI(){
  document.getElementById('glaserVal').textContent=glaserCount;
  document.getElementById('glaserDl').textContent='≈ '+(glaserCount*GLASS_DL).toFixed(1)+' dl';
  renderGlassDots();
}
function renderGlassDots(){
  const dots=document.getElementById('glassDots'); if(!dots)return;
  const slots=Math.max(8,glaserCount); let html='';
  for(let i=0;i<Math.min(slots,12);i++) html+=`<span class="glass-dot${i<glaserCount?' filled':''}"></span>`;
  dots.innerHTML=html;
}

/* COFFEE WARNING */
function checkKaffee(input){ const w=document.getElementById('kaffeeWarn'); if(w)w.classList.toggle('show',!!input.value&&input.value>'12:00'); }

/* CLEAR FORM */
function clearForm(){
  ['schlafzeit','aufwachzeit','hrv','rem','bodyBattery','schlafScore','ruhepuls','letzterKaffee','mahlzeitenBeschreibung','weiterSymptome','bildschirmWeg','trainingWas','haertesterMoment','wasLiefGut'].forEach(id=>{ const e=document.getElementById(id); if(e)e.value=''; });
  document.querySelectorAll('.toggle-group').forEach(grp=>grp.querySelectorAll('.toggle-btn').forEach(btn=>ALL_COLORS.forEach(c=>btn.classList.remove(c))));
  ['energie','brainFog'].forEach(id=>{ const e=document.getElementById(id); if(e){e.value=5;syncSlider(e,id+'Val');} });
  mahlzeitenCount=3; document.getElementById('mahlzeitenVal').textContent=3;
  glaserCount=0; updateGlassUI();
  document.getElementById('trainingDetail').classList.remove('show');
  const kw=document.getElementById('kaffeeWarn'); if(kw)kw.classList.remove('show');
}

/* SAVE */
function saveEntry(){
  const data={
    date:activeDate, savedAt:new Date().toISOString(),
    schlaf:{schlafzeit:getVal('schlafzeit'),aufwachzeit:getVal('aufwachzeit'),hrv:getVal('hrv'),rem:getVal('rem'),bodyBattery:getVal('bodyBattery'),schlafScore:getVal('schlafScore'),ruhepuls:getVal('ruhepuls')},
    gebete:{fajr:getToggle('fajr'),dhuhr:getToggle('dhuhr'),asr:getToggle('asr'),maghrib:getToggle('maghrib'),isha:getToggle('isha'),nachFajrGeschlafen:getToggle('nachFajrGeschlafen')},
    ernaehrung:{dairy:getToggle('dairy'),letzterKaffee:getVal('letzterKaffee'),anzahlMahlzeiten:mahlzeitenCount,mahlzeitenBeschreibung:getVal('mahlzeitenBeschreibung'),wasserGlaeser:glaserCount,wasserDl:glaserCount*GLASS_DL},
    koerper:{energie:getVal('energie'),brainFog:getVal('brainFog'),bauchbeschwerden:getToggle('bauchbeschwerden'),weitereSymptome:getVal('weiterSymptome')},
    verhalten:{bildschirmWeg:getVal('bildschirmWeg'),training:getToggle('training'),trainingWas:getVal('trainingWas')},
    tagesnotiz:{wasLiefGut:getVal('wasLiefGut'),haertesterMoment:getVal('haertesterMoment')}
  };
  localStorage.setItem(DAY_PFX+activeDate,JSON.stringify(data));
  const btn=document.getElementById('saveBtn');
  btn.textContent='✓ Gespeichert'; btn.classList.add('saved');
  setTimeout(()=>{ btn.textContent='Eintrag speichern'; btn.classList.remove('saved'); },2500);
  updateStatsBar(); toast('Eintrag gespeichert ✓');
}

/* LOAD */
function loadForDate(dateStr){
  const raw=localStorage.getItem(DAY_PFX+dateStr); if(!raw)return;
  const d=JSON.parse(raw);
  setVal('schlafzeit',d.schlaf?.schlafzeit); setVal('aufwachzeit',d.schlaf?.aufwachzeit);
  setVal('hrv',d.schlaf?.hrv); setVal('rem',d.schlaf?.rem);
  setVal('bodyBattery',d.schlaf?.bodyBattery); setVal('schlafScore',d.schlaf?.schlafScore); setVal('ruhepuls',d.schlaf?.ruhepuls);
  [...PRAYER_IDS,'nachFajrGeschlafen'].forEach(p=>setToggle(p,d.gebete?.[p]));
  setToggle('dairy',d.ernaehrung?.dairy);
  setVal('letzterKaffee',d.ernaehrung?.letzterKaffee);
  const ke=document.getElementById('letzterKaffee'); if(ke)checkKaffee(ke);
  mahlzeitenCount=Number(d.ernaehrung?.anzahlMahlzeiten)||3;
  document.getElementById('mahlzeitenVal').textContent=mahlzeitenCount;
  setVal('mahlzeitenBeschreibung',d.ernaehrung?.mahlzeitenBeschreibung);
  glaserCount=d.ernaehrung?.wasserGlaeser!==undefined?Number(d.ernaehrung.wasserGlaeser):d.ernaehrung?.wasserDl?Math.round(Number(d.ernaehrung.wasserDl)/GLASS_DL):0;
  updateGlassUI();
  if(d.koerper?.energie){setVal('energie',d.koerper.energie);syncSlider(document.getElementById('energie'),'energieVal');}
  if(d.koerper?.brainFog){setVal('brainFog',d.koerper.brainFog);syncSlider(document.getElementById('brainFog'),'brainFogVal');}
  setToggle('bauchbeschwerden',d.koerper?.bauchbeschwerden);
  setVal('weiterSymptome',d.koerper?.weitereSymptome);
  setVal('bildschirmWeg',d.verhalten?.bildschirmWeg);
  setToggle('training',d.verhalten?.training); setVal('trainingWas',d.verhalten?.trainingWas);
  setVal('wasLiefGut',d.tagesnotiz?.wasLiefGut); setVal('haertesterMoment',d.tagesnotiz?.haertesterMoment);
}

/* EDIT / DELETE */
function editEntry(dateStr){
  activeDate=dateStr; clearForm(); loadForDate(dateStr); updateHeader(); updateStatsBar();
  document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('tab-heute').classList.add('active');
  document.querySelectorAll('.tab-btn')[0].classList.add('active');
  document.getElementById('tab-heute').scrollTop=0;
  toast('Lade Eintrag: '+fmtLong(dateStr));
}
function deleteEntry(dateStr){
  if(!confirm('Eintrag vom '+fmtLong(dateStr)+' löschen?'))return;
  localStorage.removeItem(DAY_PFX+dateStr);
  if(activeDate===dateStr){activeDate=todayKey();updateHeader();clearForm();loadForDate(activeDate);}
  updateStatsBar(); renderVerlauf(); toast('Eintrag gelöscht');
}

/* ZIELE */
function renderGoals(){
  const d=JSON.parse(localStorage.getItem(GOALS_PFX+currentWeek)||'{}');
  document.getElementById('goalsContent').innerHTML=`
    <div class="section"><div class="section-label">Woche ${currentWeek}</div>
    <div class="card">
      <div class="field"><label class="field-label">Wochenziel</label><textarea id="goalZiel" rows="4" placeholder="Mein Hauptziel für Woche ${currentWeek}...">${esc(d.ziel)}</textarea></div>
      <div class="field"><label class="field-label">Fokuspunkt 1</label><input type="text" id="goalF1" placeholder="Erster konkreter Fokus" value="${esc(d.fokus1)}"></div>
      <div class="field"><label class="field-label">Fokuspunkt 2</label><input type="text" id="goalF2" placeholder="Zweiter konkreter Fokus" value="${esc(d.fokus2)}"></div>
      <div class="field"><label class="field-label">Fokuspunkt 3</label><input type="text" id="goalF3" placeholder="Dritter konkreter Fokus" value="${esc(d.fokus3)}"></div>
      <div class="field"><label class="field-label">Notizen zur Woche</label><textarea id="goalNotizen" rows="3" placeholder="Reflexionen, Erkenntnisse...">${esc(d.notizen)}</textarea></div>
    </div></div>
    <button class="goals-save-btn" id="goalsSaveBtn" onclick="saveGoals()">Ziele speichern</button>`;
}
function switchWeek(n,btn){ currentWeek=n; document.querySelectorAll('.week-btn').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); renderGoals(); }
function saveGoals(){
  localStorage.setItem(GOALS_PFX+currentWeek,JSON.stringify({ziel:getVal('goalZiel'),fokus1:getVal('goalF1'),fokus2:getVal('goalF2'),fokus3:getVal('goalF3'),notizen:getVal('goalNotizen')}));
  const btn=document.getElementById('goalsSaveBtn'); btn.textContent='✓ Gespeichert'; btn.classList.add('saved');
  setTimeout(()=>{ btn.textContent='Ziele speichern'; btn.classList.remove('saved'); },2500);
  toast('Ziele Woche '+currentWeek+' gespeichert ✓');
}

/* CHARTS */
function allDayKeys(){ return Object.keys(localStorage).filter(k=>k.startsWith(DAY_PFX)).map(k=>k.slice(DAY_PFX.length)).sort().reverse(); }

function destroyCharts(){ Object.values(chartInstances).forEach(c=>{try{c.destroy();}catch(e){}}); chartInstances={}; }

function renderCharts(keys){
  const cs=document.getElementById('chartsSection');
  if(!keys.length){cs.innerHTML='';return;}
  if(typeof Chart==='undefined'){
    cs.innerHTML=`<div class="section"><div class="section-label">Trends</div><div class="chart-card"><div class="chart-empty">Chart.js benötigt einmalige Internet-Verbindung beim Laden</div></div></div>`;
    return;
  }
  destroyCharts();
  const chrono=[...keys].reverse();
  const labels=chrono.map(k=>fmtShort(k));
  const extract=fn=>chrono.map(k=>{ const d=JSON.parse(localStorage.getItem(DAY_PFX+k)||'{}'); const v=fn(d); return(v!==''&&v!=null)?Number(v):null; });
  const hrv=extract(d=>d.schlaf?.hrv);
  const energie=extract(d=>d.koerper?.energie);
  const comp=extract(d=>calcCompliance(d).passed);
  Chart.defaults.color='#606070'; Chart.defaults.borderColor='#272730';
  cs.innerHTML=`<div class="section"><div class="section-label">Trends</div>
    <div class="chart-card"><div class="chart-label">HRV</div><div class="chart-wrap"><canvas id="cHRV"></canvas></div></div>
    <div class="chart-card"><div class="chart-label">Energie</div><div class="chart-wrap"><canvas id="cEnergie"></canvas></div></div>
    <div class="chart-card"><div class="chart-label">Compliance Score</div><div class="chart-wrap"><canvas id="cComp"></canvas></div></div>
  </div>`;
  const lineOpts=(data,color,yMax)=>({ type:'line', data:{labels,datasets:[{data,borderColor:color,backgroundColor:color+'22',pointBackgroundColor:color,pointRadius:3,tension:0.3,fill:true,spanGaps:true}]}, options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{grid:{color:'#272730'},ticks:{maxTicksLimit:7,font:{size:10}}},y:{grid:{color:'#272730'},ticks:{font:{size:10}},max:yMax,min:0}}} });
  const barOpts=data=>({ type:'bar', data:{labels,datasets:[{data,backgroundColor:data.map(v=>v===null?'transparent':v>=6?'rgba(34,197,94,0.5)':v>=4?'rgba(249,115,22,0.5)':'rgba(239,68,68,0.5)'),borderColor:data.map(v=>v===null?'transparent':v>=6?'#22c55e':v>=4?'#f97316':'#ef4444'),borderWidth:1,borderRadius:4}]}, options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{grid:{color:'#272730'},ticks:{maxTicksLimit:7,font:{size:10}}},y:{grid:{color:'#272730'},ticks:{font:{size:10}},max:7,min:0}}} });
  chartInstances.hrv=new Chart(document.getElementById('cHRV'),lineOpts(hrv,'#e8a020'));
  chartInstances.energie=new Chart(document.getElementById('cEnergie'),lineOpts(energie,'#22c55e',10));
  chartInstances.comp=new Chart(document.getElementById('cComp'),barOpts(comp));
}

/* VERLAUF */
function renderVerlauf(){
  const keys=allDayKeys();
  renderCharts(keys);
  const list=document.getElementById('historyList');
  if(!keys.length){ list.innerHTML=`<div class="empty"><div class="empty-icon">📋</div><div class="empty-text">Noch keine Einträge.<br>Starte mit dem Heute-Tab.</div></div>`; return; }
  list.innerHTML=`<div class="history-meta">${keys.length} Eintrag${keys.length!==1?'träge':''} gespeichert</div>`+keys.map(k=>{ const d=JSON.parse(localStorage.getItem(DAY_PFX+k)||'{}'); return renderDayCard(k,d); }).join('');
  list.querySelectorAll('.day-card-head').forEach(h=>h.addEventListener('click',()=>h.closest('.day-card').classList.toggle('open')));
}

function renderDayCard(dateStr,d){
  const comp=calcCompliance(d);
  const badgeCls=scoreClass(comp.passed);
  const rulesHtml=comp.rules.map(r=>`<div class="rule-item ${r.na?'na':r.pass?'pass':'fail'}"><span class="rule-icon">${r.na?'—':r.pass?'✓':'✗'}</span>${esc(r.label)}</div>`).join('');
  const pBadges=PRAYER_IDS.map(p=>{ const v=d.gebete?.[p]; if(!v)return''; return`<span class="p-badge ${PRAYER_COLOR[v]||''}">${PRAYER_DISP[p]} ${PRAYER_SYM[v]||v}</span>`; }).join('');
  const si=(v,label)=>v?`<div class="di"><div class="di-k">${label}</div><div class="di-v">${esc(v)}</div></div>`:'';
  const sf=(v,label)=>v?`<div class="di full"><div class="di-k">${label}</div><div class="di-v normal">${esc(v)}</div></div>`:'';
  const wasserTxt=d.ernaehrung?.wasserGlaeser!==undefined?`${d.ernaehrung.wasserGlaeser} Gläser (≈${(d.ernaehrung.wasserGlaeser*GLASS_DL).toFixed(1)} dl)`:d.ernaehrung?.wasserDl?d.ernaehrung.wasserDl+' dl':'';
  return`<div class="day-card" data-date="${dateStr}">
  <div class="day-card-head">
    <div class="day-card-info">
      <div class="day-card-date">${fmtLong(dateStr)}</div>
      <div class="day-card-meta">E: ${d.koerper?.energie||'—'}/10 · HRV: ${d.schlaf?.hrv||'—'} · Gebete: ${d.gebete?PRAYER_IDS.filter(p=>d.gebete[p]==='puenktlich').length+'/5':'—'}</div>
    </div>
    <div class="day-card-right"><span class="score-badge ${badgeCls}">${comp.passed}/7</span><span class="day-chevron">▾</span></div>
  </div>
  <div class="day-card-body">
    <div class="ds"><div class="ds-title">Compliance</div><div class="compliance-grid">${rulesHtml}</div></div>
    <div class="ds"><div class="ds-title">Schlaf</div><div class="dg">${si(d.schlaf?.schlafzeit,'Schlafzeit')}${si(d.schlaf?.aufwachzeit,'Aufwachzeit')}${si(d.schlaf?.hrv,'HRV')}${si(d.schlaf?.rem,'REM (min)')}${si(d.schlaf?.bodyBattery,'Body Battery %')}${si(d.schlaf?.schlafScore,'Schlaf-Score')}${si(d.schlaf?.ruhepuls,'Ruhepuls')}</div></div>
    <div class="ds"><div class="ds-title">Gebete</div><div class="p-badges">${pBadges||'<span style="color:var(--text-sub);font-size:12px;">—</span>'}</div>${d.gebete?.nachFajrGeschlafen?`<div style="margin-top:5px;font-size:11px;color:var(--text-sub)">Nach Fajr geschlafen: <b>${esc(d.gebete.nachFajrGeschlafen)}</b></div>`:''}</div>
    <div class="ds"><div class="ds-title">Ernährung</div><div class="dg">${si(d.ernaehrung?.dairy,'Dairy')}${si(d.ernaehrung?.letzterKaffee,'Letzter Kaffee')}${si(d.ernaehrung?.anzahlMahlzeiten,'Mahlzeiten')}${si(wasserTxt,'Wasser')}${sf(d.ernaehrung?.mahlzeitenBeschreibung,'Beschreibung')}</div></div>
    <div class="ds"><div class="ds-title">Körper &amp; Symptome</div><div class="dg">${si(d.koerper?.energie?d.koerper.energie+'/10':'','Energie')}${si(d.koerper?.brainFog?d.koerper.brainFog+'/10':'','Brain Fog')}${si(d.koerper?.bauchbeschwerden,'Bauch')}${sf(d.koerper?.weitereSymptome,'Symptome')}</div></div>
    <div class="ds"><div class="ds-title">Verhalten</div><div class="dg">${si(d.verhalten?.bildschirmWeg,'Bildschirm weg')}${si(d.verhalten?.training,'Training')}${d.verhalten?.training==='ja'?sf(d.verhalten?.trainingWas,'Was'):''}</div></div>
    ${(d.tagesnotiz?.wasLiefGut||d.tagesnotiz?.haertesterMoment)?`<div class="ds"><div class="ds-title">Tagesnotiz</div><div class="dg">${sf(d.tagesnotiz?.wasLiefGut,'Was lief gut')}${sf(d.tagesnotiz?.haertesterMoment,'Härtester Moment')}</div></div>`:'' }
    <div class="card-actions">
      <button class="card-action-btn edit" onclick="editEntry('${dateStr}')">✎ Bearbeiten</button>
      <button class="card-action-btn delete" onclick="deleteEntry('${dateStr}')">✕ Löschen</button>
    </div>
  </div>
</div>`;
}

/* EXPORT */
function exportData(){
  const out={exportedAt:new Date().toISOString(),days:{},goals:{}};
  allDayKeys().forEach(k=>{out.days[k]=JSON.parse(localStorage.getItem(DAY_PFX+k)||'{}');});
  for(let w=1;w<=4;w++){const g=localStorage.getItem(GOALS_PFX+w);if(g)out.goals['woche'+w]=JSON.parse(g);}
  const blob=new Blob([JSON.stringify(out,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob); const a=document.createElement('a');
  a.href=url; a.download='4w-protokoll-'+todayKey()+'.json'; a.click(); URL.revokeObjectURL(url);
  toast('Export gestartet ↓');
}

/* INIT */
function init(){
  initToggles(); initSliders(); renderGlassDots();
  updateHeader(); loadForDate(activeDate); updateStatsBar(); renderGoals();
}
window.addEventListener('DOMContentLoaded',init);
</script>
