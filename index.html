<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0b0b0d">
  <title>4W Protokoll</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js" defer></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #0b0b0d;
      --bg-card:     #131316;
      --bg-input:    #1a1a1f;
      --bg-hover:    #202026;
      --border:      #272730;
      --border-lit:  #34343f;
      --text:        #e0e0e8;
      --text-sub:    #606070;
      --text-mid:    #9090a0;
      --accent:      #e8a020;
      --accent-soft: rgba(232,160,32,0.12);
      --accent-glow: rgba(232,160,32,0.06);
      --green:       #22c55e;
      --green-soft:  rgba(34,197,94,0.11);
      --red:         #ef4444;
      --red-soft:    rgba(239,68,68,0.11);
      --orange:      #f97316;
      --orange-soft: rgba(249,115,22,0.11);
      --radius:      12px;
      --radius-sm:   8px;
      --font: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', 'Segoe UI', sans-serif;
      --mono: ui-monospace, 'SF Mono', 'Cascadia Mono', 'Consolas', monospace;
    }

    html { height: 100%; background: var(--bg); }
    body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      font-size: 15px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
    }

    /* ── APP SHELL ── */
    .app {
      display: flex;
      flex-direction: column;
      height: 100dvh;
      height: -webkit-fill-available;
      max-width: 430px;
      margin: 0 auto;
      position: relative;
    }

    /* Amber top stripe */
    .stripe {
      height: 2px;
      background: linear-gradient(90deg, var(--accent) 0%, rgba(232,160,32,0.3) 60%, transparent 100%);
      flex-shrink: 0;
    }

    /* ── HEADER ── */
    .header {
      padding: 12px 20px 0;
      flex-shrink: 0;
    }
    .header-date {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--text-sub);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 2px;
    }
    .header-row {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
    }
    .header-title {
      font-size: 19px;
      font-weight: 800;
      color: var(--text);
      letter-spacing: -0.03em;
    }
    .header-saved {
      font-size: 11px;
      font-weight: 700;
      color: var(--green);
      opacity: 0;
      transition: opacity 0.3s;
    }
    .header-saved.visible { opacity: 1; }

    /* ── TAB NAV ── */
    .tab-nav {
      display: flex;
      padding: 10px 20px 0;
      gap: 5px;
      flex-shrink: 0;
    }
    .tab-btn {
      flex: 1;
      padding: 10px 4px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text-sub);
      font-size: 13px;
      font-weight: 600;
      font-family: var(--font);
      cursor: pointer;
      transition: all 0.15s;
      -webkit-tap-highlight-color: transparent;
      letter-spacing: 0.01em;
    }
    .tab-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #000;
      font-weight: 800;
    }

    /* ── TAB CONTENT ── */
    .tab-content {
      display: none;
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      padding: 12px 20px calc(24px + env(safe-area-inset-bottom, 0px));
      -webkit-overflow-scrolling: touch;
      overscroll-behavior: contain;
    }
    .tab-content.active { display: block; }
    .tab-content::-webkit-scrollbar { display: none; }

    /* ── SECTION ── */
    .section { margin-bottom: 16px; }

    .section-label {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 10px;
      font-weight: 800;
      letter-spacing: 0.13em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 7px;
    }
    .section-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* ── CARD ── */
    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px;
    }

    /* ── FIELDS ── */
    .field { margin-bottom: 12px; }
    .field:last-child { margin-bottom: 0; }

    .field-label {
      display: block;
      font-size: 11px;
      font-weight: 700;
      color: var(--text-sub);
      letter-spacing: 0.05em;
      text-transform: uppercase;
      margin-bottom: 5px;
    }

    .field-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .field-row.three { grid-template-columns: 1fr 1fr 1fr; }
    .field-row .field { margin-bottom: 0; }

    /* ── INPUTS ── */
    input[type="time"],
    input[type="number"],
    input[type="text"],
    textarea {
      width: 100%;
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      font-size: 16px;
      padding: 11px 12px;
      outline: none;
      transition: border-color 0.15s, background 0.15s;
      -webkit-appearance: none;
      font-family: var(--mono);
    }
    input:focus, textarea:focus {
      border-color: var(--accent);
      background: var(--bg-hover);
    }
    input::placeholder, textarea::placeholder { color: var(--text-sub); }
    input[type="number"] { text-align: center; }
    input[type="number"]::-webkit-inner-spin-button,
    input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; }
    input[type="number"] { -moz-appearance: textfield; }
    textarea { resize: none; font-family: var(--font); font-size: 15px; min-height: 70px; line-height: 1.45; }
    input[type="time"]::-webkit-calendar-picker-indicator { filter: invert(0.5); opacity: 0.7; }

    .half-width { max-width: 48%; }

    /* ── TOGGLE GROUP ── */
    .toggle-group { display: flex; gap: 4px; }
    .toggle-btn {
      flex: 1;
      padding: 11px 4px;
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text-sub);
      font-size: 12px;
      font-weight: 700;
      font-family: var(--font);
      text-align: center;
      cursor: pointer;
      transition: all 0.14s;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      line-height: 1.2;
    }
    .toggle-btn.t-green  { background: var(--green-soft);  border-color: var(--green);  color: var(--green); }
    .toggle-btn.t-orange { background: var(--orange-soft); border-color: var(--orange); color: var(--orange); }
    .toggle-btn.t-red    { background: var(--red-soft);    border-color: var(--red);    color: var(--red); }
    .toggle-btn.t-accent { background: var(--accent-soft); border-color: var(--accent); color: var(--accent); }

    /* ── PRAYER ROWS ── */
    .prayer-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 9px 0;
      border-bottom: 1px solid var(--border);
    }
    .prayer-row:last-of-type { border-bottom: none; padding-bottom: 0; }
    .prayer-row:first-of-type { padding-top: 0; }
    .prayer-name {
      font-size: 13px;
      font-weight: 700;
      color: var(--text);
      width: 56px;
      flex-shrink: 0;
    }
    .prayer-row .toggle-group { flex: 1; }

    /* ── STEPPER ── */
    .stepper {
      display: flex;
      align-items: center;
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      overflow: hidden;
    }
    .stepper-btn {
      width: 54px;
      height: 46px;
      background: transparent;
      border: none;
      color: var(--text-mid);
      font-size: 24px;
      font-family: var(--font);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-tap-highlight-color: transparent;
      transition: background 0.1s, color 0.1s;
      flex-shrink: 0;
    }
    .stepper-btn:active { background: var(--border-lit); color: var(--text); }
    .stepper-val {
      flex: 1;
      text-align: center;
      font-family: var(--mono);
      font-size: 22px;
      font-weight: 800;
      color: var(--text);
    }

    /* ── SLIDERS ── */
    .slider-row { display: flex; align-items: center; gap: 12px; }
    .slider-num {
      font-family: var(--mono);
      font-size: 22px;
      font-weight: 800;
      color: var(--accent);
      width: 24px;
      text-align: right;
      flex-shrink: 0;
    }
    input[type="range"] {
      flex: 1;
      height: 6px;
      -webkit-appearance: none;
      appearance: none;
      background: linear-gradient(to right,
        var(--accent) 0%,
        var(--accent) var(--fill, 44.4%),
        var(--border-lit) var(--fill, 44.4%),
        var(--border-lit) 100%);
      border-radius: 3px;
      outline: none;
      cursor: pointer;
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 26px;
      height: 26px;
      background: var(--accent);
      border-radius: 50%;
      border: 3px solid var(--bg-card);
      box-shadow: 0 0 0 1.5px var(--accent);
    }
    input[type="range"]::-moz-range-thumb {
      width: 26px;
      height: 26px;
      background: var(--accent);
      border-radius: 50%;
      border: 3px solid var(--bg-card);
    }
    .slider-scale {
      display: flex;
      justify-content: space-between;
      margin-top: 3px;
    }
    .slider-scale span { font-size: 10px; color: var(--text-sub); }

    /* ── TRAINING DETAIL ── */
    .training-detail { margin-top: 10px; display: none; }
    .training-detail.show { display: block; }

    /* ── DIVIDER ── */
    .divider { height: 1px; background: var(--border); margin: 12px 0; }

    /* ── SAVE BUTTON ── */
    .save-btn {
      width: 100%;
      padding: 16px;
      background: var(--accent);
      border: none;
      border-radius: var(--radius);
      color: #000;
      font-size: 16px;
      font-weight: 800;
      font-family: var(--font);
      cursor: pointer;
      transition: all 0.15s;
      -webkit-tap-highlight-color: transparent;
      margin-top: 4px;
      letter-spacing: -0.01em;
    }
    .save-btn:active { transform: scale(0.98); opacity: 0.88; }
    .save-btn.saved { background: var(--green); }

    /* ── ZIELE TAB ── */
    .week-selector {
      display: flex;
      gap: 6px;
      margin-bottom: 14px;
    }
    .week-btn {
      flex: 1;
      padding: 11px 4px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text-sub);
      font-size: 13px;
      font-weight: 700;
      font-family: var(--font);
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: all 0.15s;
    }
    .week-btn.active {
      background: var(--accent-soft);
      border-color: var(--accent);
      color: var(--accent);
    }
    .goals-save-btn {
      width: 100%;
      padding: 14px;
      background: transparent;
      border: 1px solid var(--border-lit);
      border-radius: var(--radius);
      color: var(--text-mid);
      font-size: 14px;
      font-weight: 700;
      font-family: var(--font);
      cursor: pointer;
      transition: all 0.15s;
      -webkit-tap-highlight-color: transparent;
      margin-top: 4px;
    }
    .goals-save-btn:active { border-color: var(--accent); color: var(--accent); }
    .goals-save-btn.saved { color: var(--green); border-color: var(--green); }

    /* ── VERLAUF TAB ── */
    .history-count {
      font-size: 11px;
      color: var(--text-sub);
      margin-bottom: 12px;
      font-family: var(--mono);
    }

    .day-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      margin-bottom: 10px;
      overflow: hidden;
    }
    .day-card-head {
      padding: 13px 15px;
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }
    .day-card-head:active { background: var(--bg-hover); }
    .day-card-info { flex: 1; min-width: 0; }
    .day-card-date {
      font-family: var(--mono);
      font-size: 12px;
      font-weight: 700;
      color: var(--text);
    }
    .day-card-meta {
      font-size: 11px;
      color: var(--text-sub);
      margin-top: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .day-chevron {
      color: var(--text-sub);
      font-size: 13px;
      transition: transform 0.2s;
      flex-shrink: 0;
      margin-left: 2px;
    }
    .day-card.open .day-chevron { transform: rotate(180deg); }
    .day-card-body {
      display: none;
      padding: 0 15px 14px;
      border-top: 1px solid var(--border);
    }
    .day-card.open .day-card-body { display: block; }

    /* Detail sections inside history cards */
    .ds { margin-top: 12px; }
    .ds-title {
      font-size: 9px;
      font-weight: 800;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 7px;
    }
    .dg {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 5px;
    }
    .di {
      background: var(--bg-input);
      border-radius: 6px;
      padding: 7px 10px;
    }
    .di.full { grid-column: 1 / -1; }
    .di-k { font-size: 10px; color: var(--text-sub); margin-bottom: 1px; }
    .di-v {
      font-family: var(--mono);
      font-size: 13px;
      font-weight: 700;
      color: var(--text);
      word-break: break-word;
    }
    .di-v.normal { font-family: var(--font); font-size: 12px; font-weight: 400; line-height: 1.4; }

    .p-badges { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 1px; }
    .p-badge {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      padding: 3px 8px;
      border-radius: 5px;
      font-size: 11px;
      font-weight: 700;
    }
    .p-badge.g { background: var(--green-soft);  color: var(--green);  }
    .p-badge.o { background: var(--orange-soft); color: var(--orange); }
    .p-badge.r { background: var(--red-soft);    color: var(--red);    }

    /* ── EXPORT ── */
    .export-btn {
      width: 100%;
      padding: 14px;
      background: transparent;
      border: 1px dashed var(--border-lit);
      border-radius: var(--radius);
      color: var(--text-sub);
      font-size: 13px;
      font-weight: 700;
      font-family: var(--font);
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: all 0.15s;
      margin-top: 4px;
    }
    .export-btn:active { border-color: var(--accent); color: var(--accent); }

    /* ── EMPTY STATE ── */
    .empty {
      text-align: center;
      padding: 52px 20px;
      color: var(--text-sub);
    }
    .empty-icon { font-size: 36px; margin-bottom: 12px; opacity: 0.35; }
    .empty-text { font-size: 14px; }

    /* ── TOAST ── */
    .toast {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%) translateY(10px);
      background: var(--text);
      color: var(--bg);
      padding: 9px 20px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 800;
      opacity: 0;
      transition: all 0.22s cubic-bezier(.34,1.4,.64,1);
      pointer-events: none;
      white-space: nowrap;
      z-index: 999;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ── UTILS ── */
    .mt8 { margin-top: 8px; }
    .note-small { font-size: 11px; color: var(--text-sub); margin-top: 4px; }
  </style>
</head>
<body>
<div class="app">

  <!-- Stripe -->
  <div class="stripe"></div>

  <!-- Header -->
  <div class="header">
    <div class="header-date" id="headerDate">—</div>
    <div class="header-row">
      <div class="header-title">4W Protokoll</div>
      <div class="header-saved" id="headerSaved">● Gespeichert</div>
    </div>
  </div>

  <!-- Tab Nav -->
  <nav class="tab-nav">
    <button class="tab-btn active"  onclick="switchTab('heute',this)">Heute</button>
    <button class="tab-btn"         onclick="switchTab('ziele',this)">Ziele</button>
    <button class="tab-btn"         onclick="switchTab('verlauf',this)">Verlauf</button>
  </nav>

  <!-- ══════════════════════════════
       TAB 1 — HEUTE
       ══════════════════════════════ -->
  <div id="tab-heute" class="tab-content active">

    <!-- SCHLAF -->
    <div class="section">
      <div class="section-label">Schlaf</div>
      <div class="card">
        <div class="field-row">
          <div class="field">
            <label class="field-label">Schlafzeit</label>
            <input type="time" id="schlafzeit">
          </div>
          <div class="field">
            <label class="field-label">Aufwachzeit</label>
            <input type="time" id="aufwachzeit">
          </div>
        </div>
        <div class="field-row">
          <div class="field">
            <label class="field-label">HRV</label>
            <input type="number" id="hrv" placeholder="—" min="0" max="200">
          </div>
          <div class="field">
            <label class="field-label">REM (min)</label>
            <input type="number" id="rem" placeholder="—" min="0" max="300">
          </div>
        </div>
        <div class="field-row">
          <div class="field">
            <label class="field-label">Body Battery %</label>
            <input type="number" id="bodyBattery" placeholder="—" min="0" max="100">
          </div>
          <div class="field">
            <label class="field-label">Schlaf-Score</label>
            <input type="number" id="schlafScore" placeholder="—" min="0" max="100">
          </div>
        </div>
        <div class="field half-width">
          <label class="field-label">Ruhepuls (bpm)</label>
          <input type="number" id="ruhepuls" placeholder="—" min="30" max="120">
        </div>
      </div>
    </div>

    <!-- GEBETE -->
    <div class="section">
      <div class="section-label">Gebete</div>
      <div class="card">
        <div class="prayer-row">
          <span class="prayer-name">Fajr</span>
          <div class="toggle-group" data-name="fajr">
            <button class="toggle-btn" data-val="puenktlich" data-color="t-green">Pünktl.</button>
            <button class="toggle-btn" data-val="verspaetet" data-color="t-orange">Verspät.</button>
            <button class="toggle-btn" data-val="verpasst"   data-color="t-red">Verpasst</button>
          </div>
        </div>
        <div class="prayer-row">
          <span class="prayer-name">Dhuhr</span>
          <div class="toggle-group" data-name="dhuhr">
            <button class="toggle-btn" data-val="puenktlich" data-color="t-green">Pünktl.</button>
            <button class="toggle-btn" data-val="verspaetet" data-color="t-orange">Verspät.</button>
            <button class="toggle-btn" data-val="verpasst"   data-color="t-red">Verpasst</button>
          </div>
        </div>
        <div class="prayer-row">
          <span class="prayer-name">Asr</span>
          <div class="toggle-group" data-name="asr">
            <button class="toggle-btn" data-val="puenktlich" data-color="t-green">Pünktl.</button>
            <button class="toggle-btn" data-val="verspaetet" data-color="t-orange">Verspät.</button>
            <button class="toggle-btn" data-val="verpasst"   data-color="t-red">Verpasst</button>
          </div>
        </div>
        <div class="prayer-row">
          <span class="prayer-name">Maghrib</span>
          <div class="toggle-group" data-name="maghrib">
            <button class="toggle-btn" data-val="puenktlich" data-color="t-green">Pünktl.</button>
            <button class="toggle-btn" data-val="verspaetet" data-color="t-orange">Verspät.</button>
            <button class="toggle-btn" data-val="verpasst"   data-color="t-red">Verpasst</button>
          </div>
        </div>
        <div class="prayer-row">
          <span class="prayer-name">Isha</span>
          <div class="toggle-group" data-name="isha">
            <button class="toggle-btn" data-val="puenktlich" data-color="t-green">Pünktl.</button>
            <button class="toggle-btn" data-val="verspaetet" data-color="t-orange">Verspät.</button>
            <button class="toggle-btn" data-val="verpasst"   data-color="t-red">Verpasst</button>
          </div>
        </div>
        <div class="divider"></div>
        <div class="field">
          <label class="field-label">Nach Fajr wieder geschlafen?</label>
          <div class="toggle-group" data-name="nachFajrGeschlafen">
            <button class="toggle-btn" data-val="ja"   data-color="t-orange">Ja</button>
            <button class="toggle-btn" data-val="nein" data-color="t-green">Nein</button>
          </div>
        </div>
      </div>
    </div>

    <!-- ERNÄHRUNG -->
    <div class="section">
      <div class="section-label">Ernährung</div>
      <div class="card">
        <div class="field">
          <label class="field-label">Dairy konsumiert?</label>
          <div class="toggle-group" data-name="dairy">
            <button class="toggle-btn" data-val="ja"   data-color="t-red">Ja</button>
            <button class="toggle-btn" data-val="nein" data-color="t-green">Nein</button>
          </div>
        </div>
        <div class="field-row">
          <div class="field">
            <label class="field-label">Letzter Kaffee</label>
            <input type="time" id="letzterKaffee">
          </div>
          <div class="field">
            <label class="field-label">Wasser (dl)</label>
            <input type="number" id="wasser" placeholder="—" min="0" max="100">
          </div>
        </div>
        <div class="field">
          <label class="field-label">Anzahl Mahlzeiten</label>
          <div class="stepper">
            <button class="stepper-btn" onclick="stepChange(-1)">−</button>
            <span class="stepper-val" id="mahlzeitenVal">3</span>
            <button class="stepper-btn" onclick="stepChange(1)">+</button>
          </div>
        </div>
        <div class="field">
          <label class="field-label">Mahlzeiten Beschreibung</label>
          <textarea id="mahlzeitenBeschreibung" placeholder="Was hast du gegessen?" rows="3"></textarea>
        </div>
      </div>
    </div>

    <!-- KÖRPER & SYMPTOME -->
    <div class="section">
      <div class="section-label">Körper &amp; Symptome</div>
      <div class="card">
        <div class="field">
          <label class="field-label">Energie</label>
          <div class="slider-row">
            <span class="slider-num" id="energieVal">5</span>
            <input type="range" id="energie" min="1" max="10" value="5"
                   oninput="syncSlider(this,'energieVal')">
          </div>
          <div class="slider-scale"><span>1</span><span>10</span></div>
        </div>
        <div class="field">
          <label class="field-label">Brain Fog</label>
          <div class="slider-row">
            <span class="slider-num" id="brainFogVal">5</span>
            <input type="range" id="brainFog" min="1" max="10" value="5"
                   oninput="syncSlider(this,'brainFogVal')">
          </div>
          <div class="slider-scale"><span>1</span><span>10</span></div>
        </div>
        <div class="field">
          <label class="field-label">Bauchbeschwerden</label>
          <div class="toggle-group" data-name="bauchbeschwerden">
            <button class="toggle-btn" data-val="keine" data-color="t-green">Keine</button>
            <button class="toggle-btn" data-val="leicht" data-color="t-orange">Leicht</button>
            <button class="toggle-btn" data-val="stark"  data-color="t-red">Stark</button>
          </div>
        </div>
        <div class="field">
          <label class="field-label">Weitere Symptome</label>
          <textarea id="weiterSymptome" placeholder="Sonstige Beschwerden..." rows="2"></textarea>
        </div>
      </div>
    </div>

    <!-- VERHALTEN -->
    <div class="section">
      <div class="section-label">Verhalten</div>
      <div class="card">
        <div class="field half-width">
          <label class="field-label">Bildschirm weg um</label>
          <input type="time" id="bildschirmWeg">
        </div>
        <div class="field">
          <label class="field-label">Training heute?</label>
          <div class="toggle-group" data-name="training">
            <button class="toggle-btn" data-val="ja"   data-color="t-green">Ja</button>
            <button class="toggle-btn" data-val="nein" data-color="t-red">Nein</button>
          </div>
        </div>
        <div class="training-detail" id="trainingDetail">
          <label class="field-label">Was?</label>
          <input type="text" id="trainingWas" placeholder="z.B. Laufen 30min">
        </div>
      </div>
    </div>

    <!-- TAGESNOTIZ -->
    <div class="section">
      <div class="section-label">Tagesnotiz</div>
      <div class="card">
        <div class="field">
          <label class="field-label">Härtester Moment heute</label>
          <textarea id="haertesterMoment" placeholder="1–2 Sätze..." rows="3"></textarea>
        </div>
      </div>
    </div>

    <button class="save-btn" id="saveBtn" onclick="saveToday()">Eintrag speichern</button>

  </div><!-- /tab-heute -->


  <!-- ══════════════════════════════
       TAB 2 — ZIELE
       ══════════════════════════════ -->
  <div id="tab-ziele" class="tab-content">
    <div class="week-selector">
      <button class="week-btn active" onclick="switchWeek(1,this)">Woche 1</button>
      <button class="week-btn"        onclick="switchWeek(2,this)">Woche 2</button>
      <button class="week-btn"        onclick="switchWeek(3,this)">Woche 3</button>
      <button class="week-btn"        onclick="switchWeek(4,this)">Woche 4</button>
    </div>
    <div id="goalsContent"></div>
  </div><!-- /tab-ziele -->


  <!-- ══════════════════════════════
       TAB 3 — VERLAUF
       ══════════════════════════════ -->
  <div id="tab-verlauf" class="tab-content">
    <div id="historyList"></div>
    <button class="export-btn" onclick="exportData()">↓ JSON Export — alle Daten</button>
  </div><!-- /tab-verlauf -->

</div><!-- /app -->

<div class="toast" id="toast"></div>

<script>
/* ════════════════════════════════
   CONSTANTS & STATE
   ════════════════════════════════ */
const DAY_PFX   = 'p4w_day_';
const GOALS_PFX = 'p4w_goals_w';
const ALL_COLORS = ['t-green','t-orange','t-red','t-accent'];
const PRAYER_IDS = ['fajr','dhuhr','asr','maghrib','isha'];
const PRAYER_DISPLAY = { fajr:'Fajr', dhuhr:'Dhuhr', asr:'Asr', maghrib:'Maghrib', isha:'Isha' };
const PRAYER_COLOR_MAP = { puenktlich:'g', verspaetet:'o', verpasst:'r' };
const PRAYER_SYMBOL   = { puenktlich:'✓', verspaetet:'~', verpasst:'✗' };

let mahlzeitenCount = 3;
let currentWeek = 1;
let toastTimer = null;

/* ════════════════════════════════
   HELPERS
   ════════════════════════════════ */
function todayKey() {
  return new Date().toISOString().split('T')[0];
}

function fmtDateLong(str) {
  // str = YYYY-MM-DD
  const d = new Date(str + 'T12:00:00');
  return d.toLocaleDateString('de-DE', { weekday:'long', day:'numeric', month:'long', year:'numeric' });
}

function fmtDateShort(str) {
  const d = new Date(str + 'T12:00:00');
  return d.toLocaleDateString('de-DE', { weekday:'short', day:'2-digit', month:'2-digit', year:'2-digit' });
}

function esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function val(id) {
  const el = document.getElementById(id);
  return el ? el.value : '';
}

function setVal(id, v) {
  const el = document.getElementById(id);
  if (el && v !== undefined && v !== null && v !== '') el.value = v;
}

/* ════════════════════════════════
   TOAST
   ════════════════════════════════ */
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2200);
}

/* ════════════════════════════════
   TAB SWITCHING
   ════════════════════════════════ */
function switchTab(id, btn) {
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + id).classList.add('active');
  btn.classList.add('active');
  if (id === 'verlauf') renderHistory();
  if (id === 'ziele')   renderGoals();
}

/* ════════════════════════════════
   TOGGLE SYSTEM
   ════════════════════════════════ */
function initToggles() {
  document.querySelectorAll('.toggle-group').forEach(grp => {
    grp.querySelectorAll('.toggle-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        grp.querySelectorAll('.toggle-btn').forEach(b => ALL_COLORS.forEach(c => b.classList.remove(c)));
        btn.classList.add(btn.dataset.color);
        // Special: training detail
        if (grp.dataset.name === 'training') {
          document.getElementById('trainingDetail').classList.toggle('show', btn.dataset.val === 'ja');
        }
      });
    });
  });
}

function getToggle(name) {
  const grp = document.querySelector(`.toggle-group[data-name="${name}"]`);
  if (!grp) return '';
  for (const btn of grp.querySelectorAll('.toggle-btn')) {
    if (ALL_COLORS.some(c => btn.classList.contains(c))) return btn.dataset.val;
  }
  return '';
}

function setToggle(name, v) {
  if (!v) return;
  const grp = document.querySelector(`.toggle-group[data-name="${name}"]`);
  if (!grp) return;
  grp.querySelectorAll('.toggle-btn').forEach(btn => {
    ALL_COLORS.forEach(c => btn.classList.remove(c));
    if (btn.dataset.val === v) btn.classList.add(btn.dataset.color);
  });
  if (name === 'training') {
    const td = document.getElementById('trainingDetail');
    if (td) td.classList.toggle('show', v === 'ja');
  }
}

/* ════════════════════════════════
   SLIDERS
   ════════════════════════════════ */
function syncSlider(input, numId) {
  const v   = parseInt(input.value);
  const min = parseInt(input.min);
  const max = parseInt(input.max);
  const pct = ((v - min) / (max - min)) * 100;
  input.style.setProperty('--fill', pct + '%');
  document.getElementById(numId).textContent = v;
}

function initSliders() {
  [['energie','energieVal'],['brainFog','brainFogVal']].forEach(([id, numId]) => {
    const el = document.getElementById(id);
    if (el) syncSlider(el, numId);
  });
}

/* ════════════════════════════════
   STEPPER
   ════════════════════════════════ */
function stepChange(d) {
  mahlzeitenCount = Math.max(1, Math.min(5, mahlzeitenCount + d));
  document.getElementById('mahlzeitenVal').textContent = mahlzeitenCount;
}

/* ════════════════════════════════
   SAVE TODAY
   ════════════════════════════════ */
function saveToday() {
  const data = {
    date: todayKey(),
    savedAt: new Date().toISOString(),
    schlaf: {
      schlafzeit:   val('schlafzeit'),
      aufwachzeit:  val('aufwachzeit'),
      hrv:          val('hrv'),
      rem:          val('rem'),
      bodyBattery:  val('bodyBattery'),
      schlafScore:  val('schlafScore'),
      ruhepuls:     val('ruhepuls')
    },
    gebete: {
      fajr:              getToggle('fajr'),
      dhuhr:             getToggle('dhuhr'),
      asr:               getToggle('asr'),
      maghrib:           getToggle('maghrib'),
      isha:              getToggle('isha'),
      nachFajrGeschlafen: getToggle('nachFajrGeschlafen')
    },
    ernaehrung: {
      dairy:                  getToggle('dairy'),
      letzterKaffee:          val('letzterKaffee'),
      anzahlMahlzeiten:       mahlzeitenCount,
      mahlzeitenBeschreibung: val('mahlzeitenBeschreibung'),
      wasserDl:               val('wasser')
    },
    koerper: {
      energie:         val('energie'),
      brainFog:        val('brainFog'),
      bauchbeschwerden: getToggle('bauchbeschwerden'),
      weitereSymptome:  val('weiterSymptome')
    },
    verhalten: {
      bildschirmWeg: val('bildschirmWeg'),
      training:      getToggle('training'),
      trainingWas:   val('trainingWas')
    },
    tagesnotiz: {
      haertesterMoment: val('haertesterMoment')
    }
  };

  localStorage.setItem(DAY_PFX + todayKey(), JSON.stringify(data));

  // Button feedback
  const btn = document.getElementById('saveBtn');
  btn.textContent = '✓ Gespeichert';
  btn.classList.add('saved');
  setTimeout(() => { btn.textContent = 'Eintrag speichern'; btn.classList.remove('saved'); }, 2500);

  // Header indicator
  const hs = document.getElementById('headerSaved');
  hs.classList.add('visible');
  setTimeout(() => hs.classList.remove('visible'), 4000);

  toast('Eintrag gespeichert ✓');
}

/* ════════════════════════════════
   LOAD TODAY
   ════════════════════════════════ */
function loadToday() {
  const raw = localStorage.getItem(DAY_PFX + todayKey());
  if (!raw) return;
  const d = JSON.parse(raw);

  // Schlaf
  setVal('schlafzeit',  d.schlaf?.schlafzeit);
  setVal('aufwachzeit', d.schlaf?.aufwachzeit);
  setVal('hrv',         d.schlaf?.hrv);
  setVal('rem',         d.schlaf?.rem);
  setVal('bodyBattery', d.schlaf?.bodyBattery);
  setVal('schlafScore', d.schlaf?.schlafScore);
  setVal('ruhepuls',    d.schlaf?.ruhepuls);

  // Gebete
  [...PRAYER_IDS, 'nachFajrGeschlafen'].forEach(p => setToggle(p, d.gebete?.[p]));

  // Ernährung
  setToggle('dairy', d.ernaehrung?.dairy);
  setVal('letzterKaffee', d.ernaehrung?.letzterKaffee);
  if (d.ernaehrung?.anzahlMahlzeiten) {
    mahlzeitenCount = Number(d.ernaehrung.anzahlMahlzeiten);
    document.getElementById('mahlzeitenVal').textContent = mahlzeitenCount;
  }
  setVal('mahlzeitenBeschreibung', d.ernaehrung?.mahlzeitenBeschreibung);
  setVal('wasser', d.ernaehrung?.wasserDl);

  // Körper
  if (d.koerper?.energie) {
    setVal('energie', d.koerper.energie);
    syncSlider(document.getElementById('energie'), 'energieVal');
  }
  if (d.koerper?.brainFog) {
    setVal('brainFog', d.koerper.brainFog);
    syncSlider(document.getElementById('brainFog'), 'brainFogVal');
  }
  setToggle('bauchbeschwerden', d.koerper?.bauchbeschwerden);
  setVal('weiterSymptome', d.koerper?.weitereSymptome);

  // Verhalten
  setVal('bildschirmWeg', d.verhalten?.bildschirmWeg);
  setToggle('training', d.verhalten?.training);
  setVal('trainingWas', d.verhalten?.trainingWas);

  // Tagesnotiz
  setVal('haertesterMoment', d.tagesnotiz?.haertesterMoment);

  // Show saved indicator if already saved today
  document.getElementById('headerSaved').classList.add('visible');
  setTimeout(() => document.getElementById('headerSaved').classList.remove('visible'), 3000);
}

/* ════════════════════════════════
   ZIELE TAB
   ════════════════════════════════ */
function renderGoals() {
  const d = JSON.parse(localStorage.getItem(GOALS_PFX + currentWeek) || '{}');
  document.getElementById('goalsContent').innerHTML = `
    <div class="section">
      <div class="section-label">Woche ${currentWeek}</div>
      <div class="card">
        <div class="field">
          <label class="field-label">Wochenziel</label>
          <textarea id="goalZiel" rows="4" placeholder="Mein Hauptziel für Woche ${currentWeek}...">${esc(d.ziel)}</textarea>
        </div>
        <div class="field">
          <label class="field-label">Fokuspunkt 1</label>
          <input type="text" id="goalF1" placeholder="Erster konkreter Fokus" value="${esc(d.fokus1)}">
        </div>
        <div class="field">
          <label class="field-label">Fokuspunkt 2</label>
          <input type="text" id="goalF2" placeholder="Zweiter konkreter Fokus" value="${esc(d.fokus2)}">
        </div>
        <div class="field">
          <label class="field-label">Fokuspunkt 3</label>
          <input type="text" id="goalF3" placeholder="Dritter konkreter Fokus" value="${esc(d.fokus3)}">
        </div>
        <div class="field">
          <label class="field-label">Notizen zur Woche</label>
          <textarea id="goalNotizen" rows="3" placeholder="Reflexionen, Erkenntnisse...">${esc(d.notizen)}</textarea>
        </div>
      </div>
    </div>
    <button class="goals-save-btn" id="goalsSaveBtn" onclick="saveGoals()">Ziele speichern</button>
  `;
}

function switchWeek(n, btn) {
  currentWeek = n;
  document.querySelectorAll('.week-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderGoals();
}

function saveGoals() {
  localStorage.setItem(GOALS_PFX + currentWeek, JSON.stringify({
    ziel:    val('goalZiel'),
    fokus1:  val('goalF1'),
    fokus2:  val('goalF2'),
    fokus3:  val('goalF3'),
    notizen: val('goalNotizen')
  }));
  const btn = document.getElementById('goalsSaveBtn');
  btn.textContent = '✓ Gespeichert';
  btn.classList.add('saved');
  setTimeout(() => { btn.textContent = 'Ziele speichern'; btn.classList.remove('saved'); }, 2500);
  toast('Ziele Woche ' + currentWeek + ' gespeichert ✓');
}

/* ════════════════════════════════
   VERLAUF TAB
   ════════════════════════════════ */
function allDayKeys() {
  return Object.keys(localStorage)
    .filter(k => k.startsWith(DAY_PFX))
    .map(k => k.slice(DAY_PFX.length))
    .sort().reverse();
}

function prayerCount(gebete) {
  if (!gebete) return 0;
  return PRAYER_IDS.filter(p => gebete[p] === 'puenktlich').length;
}

function renderDayCard(dateStr, d) {
  const e  = d.koerper?.energie || '—';
  const hrv = d.schlaf?.hrv || '—';
  const pc  = d.gebete ? prayerCount(d.gebete) + '/5' : '—';

  const pBadges = PRAYER_IDS.map(p => {
    const v = d.gebete?.[p];
    if (!v) return '';
    const col = PRAYER_COLOR_MAP[v] || '';
    const sym = PRAYER_SYMBOL[v] || v;
    return `<span class="p-badge ${col}">${PRAYER_DISPLAY[p]} ${sym}</span>`;
  }).join('');

  const si = (v, label) => v ? `<div class="di"><div class="di-k">${label}</div><div class="di-v">${esc(v)}</div></div>` : '';
  const sf = (v, label) => v ? `<div class="di full"><div class="di-k">${label}</div><div class="di-v normal">${esc(v)}</div></div>` : '';

  return `
<div class="day-card" data-date="${dateStr}">
  <div class="day-card-head">
    <div class="day-card-info">
      <div class="day-card-date">${fmtDateLong(dateStr)}</div>
      <div class="day-card-meta">Energie: ${e}/10 · HRV: ${hrv} · Gebete: ${pc}</div>
    </div>
    <span class="day-chevron">▾</span>
  </div>
  <div class="day-card-body">

    <div class="ds">
      <div class="ds-title">Schlaf</div>
      <div class="dg">
        ${si(d.schlaf?.schlafzeit,'Schlafzeit')}
        ${si(d.schlaf?.aufwachzeit,'Aufwachzeit')}
        ${si(d.schlaf?.hrv,'HRV')}
        ${si(d.schlaf?.rem,'REM (min)')}
        ${si(d.schlaf?.bodyBattery,'Body Battery %')}
        ${si(d.schlaf?.schlafScore,'Schlaf-Score')}
        ${si(d.schlaf?.ruhepuls,'Ruhepuls')}
      </div>
    </div>

    <div class="ds">
      <div class="ds-title">Gebete</div>
      <div class="p-badges">${pBadges || '<span style="color:var(--text-sub);font-size:12px;">Keine Einträge</span>'}</div>
      ${d.gebete?.nachFajrGeschlafen ? `<div style="margin-top:6px;font-size:11px;color:var(--text-sub)">Nach Fajr geschlafen: <b style="color:var(--text-mid)">${esc(d.gebete.nachFajrGeschlafen)}</b></div>` : ''}
    </div>

    <div class="ds">
      <div class="ds-title">Ernährung</div>
      <div class="dg">
        ${si(d.ernaehrung?.dairy,'Dairy')}
        ${si(d.ernaehrung?.letzterKaffee,'Letzter Kaffee')}
        ${si(d.ernaehrung?.anzahlMahlzeiten,'Mahlzeiten')}
        ${si(d.ernaehrung?.wasserDl,'Wasser (dl)')}
        ${sf(d.ernaehrung?.mahlzeitenBeschreibung,'Beschreibung')}
      </div>
    </div>

    <div class="ds">
      <div class="ds-title">Körper &amp; Symptome</div>
      <div class="dg">
        ${si(d.koerper?.energie ? d.koerper.energie + '/10' : '','Energie')}
        ${si(d.koerper?.brainFog ? d.koerper.brainFog + '/10' : '','Brain Fog')}
        ${si(d.koerper?.bauchbeschwerden,'Bauch')}
        ${sf(d.koerper?.weitereSymptome,'Weitere Symptome')}
      </div>
    </div>

    <div class="ds">
      <div class="ds-title">Verhalten</div>
      <div class="dg">
        ${si(d.verhalten?.bildschirmWeg,'Bildschirm weg')}
        ${si(d.verhalten?.training,'Training')}
        ${d.verhalten?.training === 'ja' ? sf(d.verhalten?.trainingWas,'Was') : ''}
      </div>
    </div>

    ${d.tagesnotiz?.haertesterMoment ? `
    <div class="ds">
      <div class="ds-title">Tagesnotiz</div>
      <div class="di full">
        <div class="di-k">Härtester Moment</div>
        <div class="di-v normal">${esc(d.tagesnotiz.haertesterMoment)}</div>
      </div>
    </div>` : ''}

  </div>
</div>`;
}

function renderHistory() {
  const list = document.getElementById('historyList');
  const keys = allDayKeys();

  if (keys.length === 0) {
    list.innerHTML = `
      <div class="empty">
        <div class="empty-icon">📋</div>
        <div class="empty-text">Noch keine Einträge.<br>Starte mit dem Heute-Tab.</div>
      </div>`;
    return;
  }

  list.innerHTML = `<div class="history-count">${keys.length} Eintrag${keys.length !== 1 ? 'träge' : ''} gespeichert</div>` +
    keys.map(k => {
      const d = JSON.parse(localStorage.getItem(DAY_PFX + k) || '{}');
      return renderDayCard(k, d);
    }).join('');

  list.querySelectorAll('.day-card-head').forEach(head => {
    head.addEventListener('click', () => head.closest('.day-card').classList.toggle('open'));
  });
}

/* ════════════════════════════════
   EXPORT
   ════════════════════════════════ */
function exportData() {
  const out = { exportedAt: new Date().toISOString(), days: {}, goals: {} };

  allDayKeys().forEach(k => {
    out.days[k] = JSON.parse(localStorage.getItem(DAY_PFX + k) || '{}');
  });

  for (let w = 1; w <= 4; w++) {
    const g = localStorage.getItem(GOALS_PFX + w);
    if (g) out.goals['woche' + w] = JSON.parse(g);
  }

  const blob = new Blob([JSON.stringify(out, null, 2)], { type: 'application/json' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href     = url;
  a.download = '4w-protokoll-' + todayKey() + '.json';
  a.click();
  URL.revokeObjectURL(url);
  toast('Export gestartet ↓');
}

/* ════════════════════════════════
   INIT
   ════════════════════════════════ */
function init() {
  // Set header date
  document.getElementById('headerDate').textContent = fmtDateLong(todayKey());

  // Init interactive elements
  initToggles();
  initSliders();

  // Load existing today data
  loadToday();

  // Render goals
  renderGoals();
}

window.addEventListener('DOMContentLoaded', init);
